name: Build and Deploy Books

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: books-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install mdBook tools
        run: |
          cargo install mdbook --version 0.5.2
          cargo install mdbook-bib --version 0.5.2

      - name: Build English book
        run: |
          cd book/en
          mdbook build

      - name: Build Chinese book
        run: |
          cd book/zh
          mdbook build

      - name: Assemble Pages site
        run: |
          rm -rf _site
          mkdir -p _site/en _site/zh
          cp -R book/en/dist/. _site/en/
          cp -R book/zh/dist/. _site/zh/
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>llm.sql Books</title>
          </head>
          <body>
            <h1>llm.sql Books</h1>
            <ul>
              <li><a href="en/">English Book</a></li>
              <li><a href="zh/">中文文档</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4